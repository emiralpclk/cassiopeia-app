name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: cassiopeia/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: cassiopeia
      - name: Build
        run: npm run build
        working-directory: cassiopeia
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cassiopeia/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
